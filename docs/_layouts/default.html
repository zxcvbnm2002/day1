<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>1</text></svg>">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a class="logo" href="{{ '/' | relative_url }}">
        <span class="logo-mark">1</span>
        <span class="logo-text">day1</span>
      </a>
      {% if page.url != '/' %}
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">首页</a>
      </nav>
      {% endif %}
    </header>

    <main class="site-main{% if page.page_class %} {{ page.page_class }}{% endif %}">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>© {{ 'now' | date: '%Y' }} day1</p>
      <p><a href="mailto:zyhp105mt@outlook.com">zyhp105mt@outlook.com</a></p>
    </footer>
  </div>
</body>
</html>
